name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create full Flutter project
        run: |
          # Create a fresh Flutter project to get proper android/ios dirs
          cd $RUNNER_TEMP
          flutter create --org com.rudiawenk6 --project-name mix_parlay_tracker --platforms android parlay_app
          
      - name: Copy our source code
        run: |
          # Copy our lib/ and pubspec.yaml into the generated project
          cp -r $GITHUB_WORKSPACE/lib/* $RUNNER_TEMP/parlay_app/lib/
          cp $GITHUB_WORKSPACE/pubspec.yaml $RUNNER_TEMP/parlay_app/pubspec.yaml
          
      - name: Install dependencies
        working-directory: ${{ runner.temp }}/parlay_app
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ runner.temp }}/parlay_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mix-parlay-tracker
          path: ${{ runner.temp }}/parlay_app/build/app/outputs/flutter-apk/app-release.apk
