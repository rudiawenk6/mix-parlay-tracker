name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create full Flutter project
        run: |
          cd $RUNNER_TEMP
          flutter create --org com.rudiawenk6 --project-name mix_parlay_tracker --platforms android parlay_app

      - name: Copy our source code
        run: |
          # Copy lib/ and pubspec.yaml
          cp -r $GITHUB_WORKSPACE/lib/* $RUNNER_TEMP/parlay_app/lib/
          cp $GITHUB_WORKSPACE/pubspec.yaml $RUNNER_TEMP/parlay_app/pubspec.yaml

      - name: Copy Android network config
        run: |
          APP_DIR=$RUNNER_TEMP/parlay_app/android/app/src/main
          
          # Copy AndroidManifest.xml
          if [ -f "$GITHUB_WORKSPACE/android/AndroidManifest.xml" ]; then
            cp $GITHUB_WORKSPACE/android/AndroidManifest.xml $APP_DIR/AndroidManifest.xml
          fi
          
          # Copy network security config
          if [ -f "$GITHUB_WORKSPACE/android/network_security_config.xml" ]; then
            mkdir -p $APP_DIR/res/xml
            cp $GITHUB_WORKSPACE/android/network_security_config.xml $APP_DIR/res/xml/network_security_config.xml
          fi

      - name: Verify Android config
        run: |
          APP_DIR=$RUNNER_TEMP/parlay_app/android/app/src/main
          echo "=== AndroidManifest ==="
          head -10 $APP_DIR/AndroidManifest.xml
          echo ""
          echo "=== Network Security Config ==="
          cat $APP_DIR/res/xml/network_security_config.xml
          echo ""
          echo "=== Internet Permission ==="
          grep -c "INTERNET" $APP_DIR/AndroidManifest.xml

      - name: Install dependencies
        working-directory: ${{ runner.temp }}/parlay_app
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ runner.temp }}/parlay_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mix-parlay-tracker
          path: ${{ runner.temp }}/parlay_app/build/app/outputs/flutter-apk/app-release.apk
