name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create full Flutter project
        run: |
          cd $RUNNER_TEMP
          flutter create --org com.rudiawenk6 --project-name mix_parlay_tracker --platforms android parlay_app

      - name: Copy our source code
        run: |
          cp -r $GITHUB_WORKSPACE/lib/* $RUNNER_TEMP/parlay_app/lib/
          cp $GITHUB_WORKSPACE/pubspec.yaml $RUNNER_TEMP/parlay_app/pubspec.yaml

      - name: Setup Android network permissions
        run: |
          APP_DIR=$RUNNER_TEMP/parlay_app/android/app/src/main
          
          # Add INTERNET permissions to AndroidManifest
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>|' $APP_DIR/AndroidManifest.xml
          
          # Add usesCleartextTraffic and networkSecurityConfig to application tag
          sed -i 's|android:icon="@mipmap/ic_launcher">|android:icon="@mipmap/ic_launcher"\n        android:usesCleartextTraffic="true"\n        android:networkSecurityConfig="@xml/network_security_config">|' $APP_DIR/AndroidManifest.xml
          
          # Create res/xml directory and network security config
          mkdir -p $APP_DIR/res/xml
          cat > $APP_DIR/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system"/>
                      <certificates src="user"/>
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">letsaiabt365.com</domain>
                  <domain includeSubdomains="true">bwb365liga.com</domain>
                  <domain includeSubdomains="true">bwbet365.com</domain>
                  <domain includeSubdomains="true">wb365asia.com</domain>
                  <domain includeSubdomains="true">live10.goaloo28.com</domain>
                  <domain includeSubdomains="true">api.telegram.org</domain>
                  <domain includeSubdomains="true">openrouter.ai</domain>
              </domain-config>
          </network-security-config>
          XMLEOF

      - name: Verify Android config
        run: |
          APP_DIR=$RUNNER_TEMP/parlay_app/android/app/src/main
          echo "=== AndroidManifest ===" && head -15 $APP_DIR/AndroidManifest.xml
          echo "=== Network Security Config ===" && cat $APP_DIR/res/xml/network_security_config.xml
          echo "=== INTERNET permission count ===" && grep -c "INTERNET" $APP_DIR/AndroidManifest.xml

      - name: Install dependencies
        working-directory: ${{ runner.temp }}/parlay_app
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ runner.temp }}/parlay_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mix-parlay-tracker
          path: ${{ runner.temp }}/parlay_app/build/app/outputs/flutter-apk/app-release.apk
